server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    druid:
      master:
        url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:iwip_manajemen}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B9&rewriteBatchedStatements=true
        username: ${DB_USERNAME:iwip}
        password: ${DB_PASSWORD}
      slave:
        enabled: false
      initialSize: 5
      minIdle: 10
      maxActive: 20
      maxWait: 60000
      connectTimeout: 30000
      socketTimeout: 60000
      statViewServlet:
        enabled: false
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DATABASE:1}
    timeout: 10s

# Production: set origin eksplisit via CORS_ALLOWED_ORIGINS (bukan *)
cors:
  allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:}

logging:
  level:
    com.iwip: info
    org.springframework: warn
